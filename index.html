<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Control</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">

<div class="max-w-md mx-auto p-5 space-y-5 pb-28">

<h1 class="text-3xl font-bold">
Finance Control
</h1>

<p class="text-zinc-400">
Controle hoje. Liberdade amanhã.
</p>

<div class="bg-zinc-900 rounded-3xl p-5">

<h2 class="text-xl font-bold mb-4">
Dados Financeiros
</h2>

<input
id="salario"
type="number"
placeholder="Salário"
class="w-full bg-zinc-800 rounded-2xl p-3 mb-3 outline-none"
>

<input
id="divida"
type="number"
placeholder="Dívidas"
class="w-full bg-zinc-800 rounded-2xl p-3 mb-3 outline-none"
>

<input
id="investimento"
type="number"
placeholder="Investimentos"
class="w-full bg-zinc-800 rounded-2xl p-3 outline-none"
>

</div>

<div class="grid grid-cols-2 gap-4">

<div class="bg-zinc-900 rounded-3xl p-4">
<p class="text-zinc-400 text-sm">
Investimentos
</p>

<h2
id="investimentoTexto"
class="text-2xl font-bold mt-2"
>
R$ 0,00
</h2>
</div>

<div class="bg-zinc-900 rounded-3xl p-4">
<p class="text-zinc-400 text-sm">
Livre no mês
</p>

<h2
id="livreTexto"
class="text-2xl font-bold mt-2"
>
R$ 0,00
</h2>
</div>

</div>

<div class="bg-zinc-900 rounded-3xl p-5">

<h2 class="text-xl font-bold mb-4">
Resumo Inteligente
</h2>

<p id="resumo" class="text-zinc-300">
Carregando...
</p>

</div>

</div>

<div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800">

<div class="max-w-md mx-auto grid grid-cols-4 gap-3 p-4">

<button class="bg-zinc-900 rounded-2xl h-14 text-2xl">
🏠
</button>

<button class="bg-zinc-900 rounded-2xl h-14 text-2xl">
📈
</button>

<button class="bg-zinc-900 rounded-2xl h-14 text-2xl">
💳
</button>

<button class="bg-zinc-900 rounded-2xl h-14 text-2xl">
⚙️
</button>

</div>

</div>

<script>

const salario =
document.getElementById('salario');

const divida =
document.getElementById('divida');

const investimento =
document.getElementById('investimento');

const investimentoTexto =
document.getElementById('investimentoTexto');

const livreTexto =
document.getElementById('livreTexto');

const resumo =
document.getElementById('resumo');

salario.value =
localStorage.getItem('salario') || 1600;

divida.value =
localStorage.getItem('divida') || 0;

investimento.value =
localStorage.getItem('investimento') || 0;

function atualizar() {

const salarioValor =
Number(salario.value);

const dividaValor =
Number(divida.value);

const investimentoValor =
Number(investimento.value);

const livre =
salarioValor - dividaValor;

localStorage.setItem(
'salario',
salarioValor
);

localStorage.setItem(
'divida',
dividaValor
);

localStorage.setItem(
'investimento',
investimentoValor
);

investimentoTexto.innerText =
'R$ ' + investimentoValor.toFixed(2);

livreTexto.innerText =
'R$ ' + livre.toFixed(2);

resumo.innerText =
'Você possui R$ ' +
livre.toFixed(2) +
' livres no mês.';

}

salario.addEventListener(
'input',
atualizar
);

divida.addEventListener(
'input',
atualizar
);

investimento.addEventListener(
'input',
atualizar
);

atualizar();

</script>

</body>
</html>
