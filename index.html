<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Control AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#050816;
color:white;
min-height:100vh;
padding-bottom:120px;
}

.background{
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:
radial-gradient(circle at top left,#12305d 0%,transparent 35%),
radial-gradient(circle at bottom right,#081220 0%,transparent 35%),
#050816;
}

.page{display:none;}
.active{display:block;}

header{
padding:20px;
display:flex;
justify-content:space-between;
}

.logo{font-size:26px;font-weight:700;}
.logo span{color:#67a4ff;}

.main-card,.card,.section,nav{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
}

.main-card{width:92%;margin:auto;padding:25px;margin-top:15px;}

.balance{font-size:40px;font-weight:700;}

.cards{
width:92%;
margin:20px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
}

.card{padding:18px;}

.value{font-size:26px;font-weight:700;}

.section{width:92%;margin:15px auto;padding:20px;}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
}

.save-btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#2459a6;
color:white;
}

/* PROGRESS */
.progress-container{
width:100%;
height:18px;
background:rgba(255,255,255,0.08);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#2459a6,#67a4ff);
transition:0.6s;
}

/* NAV */
nav{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
justify-content:space-around;
padding:12px;
}

nav a{
color:white;
font-size:13px;
opacity:0.7;
cursor:pointer;
}

nav a.active-tab{
color:#79a7ff;
opacity:1;
}
</style>
</head>

<body>

<div class="background"></div>

<header>
<div class="logo">Finance <span>AI</span></div>
</header>

<!-- HOME -->
<div id="home" class="page active">

<section class="main-card">
<h2>Saldo</h2>
<div class="balance" id="saldo">0</div>
</section>

<section class="cards">
<div class="card"><h3>Entradas</h3><div class="value" id="entradas">0</div></div>
<div class="card"><h3>Gastos</h3><div class="value" id="gastos">0</div></div>
<div class="card"><h3>Invest</h3><div class="value" id="investimentosValor">0</div></div>
<div class="card"><h3>Economia</h3><div class="value" id="economia">0</div></div>
</section>

<section class="section">
<canvas id="grafico"></canvas>
</section>

</div>

<!-- META -->
<div id="investimentos" class="page">

<section class="section">
<h2>Meta Inteligente</h2>

<input id="meta" placeholder="Meta (ex: 5000)">
<input id="meses" placeholder="Meses">

<button class="save-btn" onclick="calcMeta()">Calcular</button>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

<div id="resultado"></div>

<div id="advisor"></div>
</section>

</div>

<!-- PERFIL -->
<div id="perfil" class="page">

<section class="section">
<h2>Consultor Financeiro</h2>

<div id="alerta"></div>

<button class="save-btn" onclick="limpar()">Limpar</button>
</section>

</div>

<!-- MENU -->
<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('investimentos')">Meta</a>
<a onclick="show('perfil')">AI</a>
</nav>

<script>

let saldo=0,entradas=0,gastos=0,investimentos=0;

let metaAtual=0;
let mesesAtual=1;

let chart;

let data=[0,0,0,0,0,0,0];

function initChart(){
const ctx=document.getElementById("grafico");

chart=new Chart(ctx,{
type:"line",
data:{
labels:["1","2","3","4","5","6","7"],
datasets:[
{
label:"Fluxo",
data:data,
borderWidth:2
},
{
label:"Meta",
data:[0,0,0,0,0,0,0],
borderWidth:2
}
]
}
});
}

function updateChart(v){
data.push(v);
data.shift();
chart.update();
}

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function add(v){
saldo+=v;
updateChart(v);
update();
}

function update(){

document.getElementById("saldo").innerText=saldo;
document.getElementById("entradas").innerText=entradas;
document.getElementById("gastos").innerText=gastos;
document.getElementById("investimentosValor").innerText=investimentos;
document.getElementById("economia").innerText=saldo-gastos;

checkAdvisor();
updateProgress();
}

function calcMeta(){

metaAtual=parseFloat(document.getElementById("meta").value);
mesesAtual=parseFloat(document.getElementById("meses").value);

let mensal=metaAtual/mesesAtual;

document.getElementById("resultado").innerHTML=
"Você precisa investir R$ "+mensal.toFixed(2);

simulate(mensal);
}

function updateProgress(){

if(metaAtual<=0) return;

let perc=(investimentos/metaAtual)*100;

document.getElementById("progress").style.width=Math.min(perc,100)+"%";

if(perc>=80){
document.getElementById("alerta").innerHTML="⚠️ Você está perto da meta!";
}

if(perc>=100){
document.getElementById("alerta").innerHTML="🎉 Meta atingida!";
}
}

function simulate(m){

let tempo=(metaAtual-(investimentos))/m;

document.getElementById("advisor").innerHTML=
"Se aumentar R$100, termina mais rápido.";
}

function checkAdvisor(){

let disponivel=saldo-gastos;

if(disponivel>500){

document.getElementById("alerta").innerHTML=
"💡 Você pode investir mais hoje!";
}
}

function limpar(){
saldo=entradas=gastos=investimentos=0;
metaAtual=0;
document.getElementById("alerta").innerHTML="";
update();
}

initChart();
update();

</script>

</body>
</html>
