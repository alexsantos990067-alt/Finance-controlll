<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Control</title>

<link rel="manifest" href="manifest.webmanifest">

<meta name="theme-color" content="#0B0B10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

body{
background:#0B0B10;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}

.card{
background:#17171f;
padding:20px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:10px;
background:#222230;
color:white;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:#8A05BE;
color:white;
font-size:18px;
margin-top:10px;
font-weight:bold;
}

.gasto{
background:#1d1d28;
padding:15px;
border-radius:15px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-size:35px;
margin-bottom:5px;
}

.roxo{
color:#bb86fc;
}

.valor{
color:#bb86fc;
font-size:28px;
font-weight:bold;
}

.info{
margin-top:15px;
}

.info h3{
margin-bottom:5px;
}

.remover{
width:auto;
padding:10px 15px;
background:red;
font-size:14px;
}

</style>
</head>

<body>

<h1>Finance <span class="roxo">Control</span></h1>

<div class="card">

<h3>Salário mensal</h3>

<input id="salario" type="number" value="1600">

<div class="info">
<h3>Total gasto</h3>
<div id="total" class="valor">R$ 0</div>
</div>

<div class="info">
<h3>Restante</h3>
<div id="restante" class="valor">R$ 0</div>
</div>

<div class="info">
<h3>Investimento recomendado (30%)</h3>
<div id="investimento" class="valor">R$ 0</div>
</div>

<div class="info">
<h3>Gasto anual estimado</h3>
<div id="mensal" class="valor">R$ 0</div>
</div>

</div>

<div class="card">

<h3>Adicionar gasto</h3>

<input id="nome" placeholder="Nome do gasto">

<input id="valor" type="number" placeholder="Valor">

<button onclick="addGasto()">
Adicionar gasto
</button>

</div>

<div id="lista"></div>

<script>

let gastos = [];

function atualizar(){

let salario =
Number(document.getElementById('salario').value);

let total = 0;

gastos.forEach(g=>{
total += g.valor;
});

let restante = salario - total;

let investimento =
restante > 0
? restante * 0.30
: 0;

let gastoAnual =
total * 12;

document.getElementById('total').innerHTML =
'R$ ' + total.toFixed(2);

document.getElementById('restante').innerHTML =
'R$ ' + restante.toFixed(2);

document.getElementById('investimento').innerHTML =
'R$ ' + investimento.toFixed(2);

document.getElementById('mensal').innerHTML =
'R$ ' + gastoAnual.toFixed(2);

let lista =
document.getElementById('lista');

lista.innerHTML = '';

gastos.forEach((g,index)=>{

lista.innerHTML += `
<div class="gasto">

<div>
<b>${g.nome}</b><br>
R$ ${g.valor.toFixed(2)}
</div>

<button
class="remover"
onclick="remover(${index})">
Remover
</button>

</div>
`;

});

localStorage.setItem(
'gastos',
JSON.stringify(gastos)
);

localStorage.setItem(
'salario',
salario
);

}

function addGasto(){

let nome =
document.getElementById('nome').value;

let valor =
Number(document.getElementById('valor').value);

if(nome=='' || valor<=0){
return;
}

gastos.push({
nome,
valor
});

document.getElementById('nome').value = '';

document.getElementById('valor').value = '';

atualizar();

}

function remover(i){

gastos.splice(i,1);

atualizar();

}

let salvo =
localStorage.getItem('gastos');

if(salvo){
gastos = JSON.parse(salvo);
}

let salarioSalvo =
localStorage.getItem('salario');

if(salarioSalvo){
document.getElementById('salario').value =
salarioSalvo;
}

document.getElementById('salario')
.addEventListener('input', atualizar);

atualizar();

if ("serviceWorker" in navigator){
navigator.serviceWorker.register("./sw.js");
}

</script>

</body>
</html>
