<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Control</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#050816;
color:white;
min-height:100vh;
padding-bottom:120px;
}

.background{
position:fixed;width:100%;height:100%;z-index:-1;
background:
radial-gradient(circle at top left,#12305d 0%,transparent 35%),
radial-gradient(circle at bottom right,#081220 0%,transparent 35%),
#050816;
}

header{padding:20px;display:flex;justify-content:space-between;}

.logo{font-size:26px;font-weight:700;}
.logo span{color:#67a4ff;}

.page{display:none;}
.active{display:block;}

.main-card,.card,.section,nav{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
}

.main-card{width:92%;margin:auto;padding:25px;}

.balance{font-size:40px;font-weight:700;}

.actions{display:flex;gap:10px;flex-wrap:wrap;}

.btn{
flex:1;padding:12px;border:none;border-radius:12px;
background:#12305d;color:white;
}

.cards{
width:92%;margin:20px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
}

.card{padding:18px;}

.value{font-size:26px;font-weight:700;}

.section{width:92%;margin:20px auto;padding:20px;}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
}

.save-btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#2459a6;
color:white;
}

/* PROGRESS BAR */
.progress-container{
width:100%;
height:18px;
background:rgba(255,255,255,0.08);
border-radius:20px;
overflow:hidden;
margin-top:12px;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#2459a6,#67a4ff);
transition:0.6s;
}

/* NAV */
nav{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
justify-content:space-around;
padding:12px;
}

nav a{
color:white;
font-size:13px;
opacity:0.7;
}

nav a.active-tab{
color:#79a7ff;
opacity:1;
}
</style>
</head>

<body>

<div class="background"></div>

<header>
<div class="logo">Finance <span>Control</span></div>
</header>

<!-- HOME -->
<div id="home" class="page active">

<section class="main-card">
<h2>Saldo</h2>
<div class="balance" id="saldo">0</div>
</section>

<section class="cards">
<div class="card"><h3>Entradas</h3><div class="value" id="entradas">0</div></div>
<div class="card"><h3>Gastos</h3><div class="value" id="gastos">0</div></div>
<div class="card"><h3>Invest</h3><div class="value" id="investimentosValor">0</div></div>
<div class="card"><h3>Economia</h3><div class="value" id="economia">0</div></div>
</section>

<section class="section">
<canvas id="grafico"></canvas>
</section>

</div>

<!-- CARTEIRA -->
<div id="carteira" class="page">

<section class="section">
<h2>Receita</h2>
<input id="receitaValor">
<button class="save-btn" onclick="addReceita()">Adicionar</button>
</section>

<section class="section">
<h2>Gasto</h2>
<input id="gastoValor">
<select id="categoria">
<option>Mercado</option>
<option>Contas</option>
<option>Lazer</option>
<option>Outros</option>
</select>
<button class="save-btn" onclick="addGasto()">Adicionar</button>
</section>

</div>

<!-- INVEST -->
<div id="investimentos" class="page">

<section class="section">
<h2>Meta</h2>
<input id="meta">
<input id="meses">
<button class="save-btn" onclick="calcMeta()">Calcular</button>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

<div id="resultado"></div>
</section>

</div>

<!-- PERFIL -->
<div id="perfil" class="page">

<section class="section">
<h2>Perfil</h2>
<button class="save-btn" onclick="limpar()">Limpar Dados</button>
</section>

</div>

<!-- MENU -->
<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('carteira')">Carteira</a>
<a onclick="show('investimentos')">Invest</a>
<a onclick="show('perfil')">Perfil</a>
</nav>

<script>

let saldo=0,entradas=0,gastos=0,investimentos=0;

let labels=["Seg","Ter","Qua","Qui","Sex","Sab","Dom"];
let data=[0,0,0,0,0,0,0];

let chart;

function initChart(){
const ctx=document.getElementById("grafico");

chart=new Chart(ctx,{
type:"line",
data:{
labels,
datasets:[{
label:"Fluxo",
data,
borderWidth:2,
tension:0.4
}]
}
});
}

function updateChart(value){
data.push(value);
data.shift();
chart.update();
}

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function addReceita(){
let v=parseFloat(document.getElementById("receitaValor").value);
if(isNaN(v))return;
saldo+=v;
entradas+=v;
updateChart(v);
update();
}

function addGasto(){
let v=parseFloat(document.getElementById("gastoValor").value);
if(isNaN(v))return;
let cat=document.getElementById("categoria").value;

saldo-=v;
gastos+=v;

updateChart(-v);
update();
}

function update(){
document.getElementById("saldo").innerText="R$ "+saldo;
document.getElementById("entradas").innerText=entradas;
document.getElementById("gastos").innerText=gastos;
document.getElementById("investimentosValor").innerText=investimentos;
document.getElementById("economia").innerText=saldo-gastos;

updateProgress();
}

function calcMeta(){
let meta=parseFloat(document.getElementById("meta").value);
let meses=parseFloat(document.getElementById("meses").value);

let perc=(investimentos/meta)*100;
document.getElementById("progress").style.width=perc+"%";

document.getElementById("resultado").innerText=
"R$ "+(meta/meses).toFixed(2)+"/mês";
}

function updateProgress(){
let meta=parseFloat(document.getElementById("meta").value)||1;
let perc=(investimentos/meta)*100;
document.getElementById("progress").style.width=Math.min(perc,100)+"%";
}

function limpar(){
saldo=entradas=gastos=investimentos=0;
update();
alert("Limpo!");
}

initChart();
update();

</script>

</body>
</html>
