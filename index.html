<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Control</title>

<meta name="theme-color" content="#0B0B10">

<link rel="manifest" href="manifest.webmanifest">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0B0B10;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
padding:20px;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-size:34px;
font-weight:bold;
}

.logo span{
color:#BB86FC;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:#8A05BE;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
}

.card{
background:#17171F;
border-radius:28px;
padding:22px;
margin-bottom:18px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.label{
font-size:14px;
color:#A0A0B8;
margin-bottom:8px;
}

.valor{
font-size:34px;
font-weight:bold;
}

.roxo{
color:#BB86FC;
}

.verde{
color:#00E676;
}

.vermelho{
color:#FF5252;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.mini-card{
background:#20202B;
padding:18px;
border-radius:22px;
}

.mini-card h3{
font-size:13px;
color:#9D9DB5;
margin-bottom:10px;
}

.mini-card p{
font-size:22px;
font-weight:bold;
}

input, select{
width:100%;
padding:15px;
border:none;
border-radius:18px;
background:#222230;
color:white;
font-size:16px;
margin-top:12px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:20px;
background:#8A05BE;
color:white;
font-size:18px;
font-weight:bold;
margin-top:15px;
}

.gasto{
background:#20202B;
padding:18px;
border-radius:20px;
margin-top:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.gasto-nome{
font-size:18px;
font-weight:bold;
}

.gasto-cat{
font-size:13px;
color:#A0A0B8;
margin-top:5px;
}

.remover{
background:#FF5252;
padding:10px 15px;
border-radius:14px;
font-size:14px;
width:auto;
}

.barra{
width:100%;
height:12px;
background:#262636;
border-radius:20px;
margin-top:15px;
overflow:hidden;
}

.progresso{
height:100%;
background:#8A05BE;
width:0%;
transition:0.4s;
}

.meta-texto{
margin-top:10px;
font-size:14px;
color:#A0A0B8;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

.valor{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="topo">

<div class="logo">
Finance <span>Control</span>
</div>

<div class="avatar">
A
</div>

</div>

<div class="card">

<div class="label">
Saldo disponível
</div>

<div id="restante" class="valor verde">
R$ 0
</div>

<div class="grid">

<div class="mini-card">
<h3>Total gasto</h3>
<p id="total">R$ 0</p>
</div>

<div class="mini-card">
<h3>Investimento ideal</h3>
<p id="investimento" class="roxo">
R$ 0
</p>
</div>

<div class="mini-card">
<h3>Gasto anual</h3>
<p id="anual">
R$ 0
</p>
</div>

<div class="mini-card">
<h3>Meta mensal</h3>
<p id="metaMes">
R$ 0
</p>
</div>

</div>

</div>

<div class="card">

<div class="label">
Seu salário mensal
</div>

<input
id="salario"
type="number"
value="1600"
>

<div class="label" style="margin-top:20px;">
Sua meta financeira
</div>

<input
id="meta"
type="number"
value="5000"
>

<div class="barra">
<div class="progresso" id="progresso"></div>
</div>

<div class="meta-texto" id="metaTexto">
0%
</div>

</div>

<div class="card">

<div class="label">
Adicionar gasto
</div>

<input
id="nome"
placeholder="Nome do gasto"
>

<input
id="valor"
type="number"
placeholder="Valor"
>

<select id="categoria">

<option>Moradia</option>
<option>Mercado</option>
<option>Lazer</option>
<option>Transporte</option>
<option>Internet</option>
<option>Saúde</option>
<option>Investimento</option>

</select>

<select id="parcelado">

<option value="1">
À vista
</option>

<option value="2">
2x
</option>

<option value="3">
3x
</option>

<option value="6">
6x
</option>

<option value="12">
12x
</option>

</select>

<button onclick="addGasto()">
Adicionar gasto
</button>

</div>

<div id="lista"></div>

<script>

let gastos = [];

function dinheiro(v){

return v.toLocaleString(
'pt-BR',
{
style:'currency',
currency:'BRL'
}
);

}

function atualizar(){

let salario =
Number(
document.getElementById('salario').value
);

let meta =
Number(
document.getElementById('meta').value
);

let total = 0;

gastos.forEach(g=>{

total += g.valor;

});

let restante =
salario - total;

let investimento =
restante > 0
? restante * 0.30
: 0;

let anual =
total * 12;

let metaMes =
meta / 12;

document.getElementById('total')
.innerHTML =
dinheiro(total);

document.getElementById('restante')
.innerHTML =
dinheiro(restante);

document.getElementById('investimento')
.innerHTML =
dinheiro(investimento);

document.getElementById('anual')
.innerHTML =
dinheiro(anual);

document.getElementById('metaMes')
.innerHTML =
dinheiro(metaMes);

let progresso =
Math.min(
100,
(investimento/meta)*100
);

document.getElementById('progresso')
.style.width =
progresso + '%';

document.getElementById('metaTexto')
.innerHTML =
progresso.toFixed(0)
+ '% da meta';

let lista =
document.getElementById('lista');

lista.innerHTML = '';

gastos.forEach((g,index)=>{

lista.innerHTML += `

<div class="gasto">

<div>

<div class="gasto-nome">
${g.nome}
</div>

<div class="gasto-cat">
${g.categoria}
• ${g.parcelas}x
</div>

</div>

<div>

<div style="
font-weight:bold;
margin-bottom:8px;
">

${dinheiro(g.valor)}

</div>

<button
class="remover"
onclick="remover(${index})">
X
</button>

</div>

</div>

`;

});

localStorage.setItem(
'gastos',
JSON.stringify(gastos)
);

localStorage.setItem(
'salario',
salario
);

localStorage.setItem(
'meta',
meta
);

}

function addGasto(){

let nome =
document.getElementById('nome').value;

let valor =
Number(
document.getElementById('valor').value
);

let categoria =
document.getElementById('categoria').value;

let parcelas =
Number(
document.getElementById('parcelado').value
);

if(nome == '' || valor <= 0){

return;

}

let valorParcela =
valor / parcelas;

gastos.push({

nome,
valor:valorParcela,
categoria,
parcelas

});

document.getElementById('nome').value='';
document.getElementById('valor').value='';

atualizar();

}

function remover(i){

gastos.splice(i,1);

atualizar();

}

let salvo =
localStorage.getItem('gastos');

if(salvo){

gastos = JSON.parse(salvo);

}

let salarioSalvo =
localStorage.getItem('salario');

if(salarioSalvo){

document.getElementById('salario').value =
salarioSalvo;

}

let metaSalva =
localStorage.getItem('meta');

if(metaSalva){

document.getElementById('meta').value =
metaSalva;

}

document
.getElementById('salario')
.addEventListener(
'input',
atualizar
);

document
.getElementById('meta')
.addEventListener(
'input',
atualizar
);

atualizar();

if("serviceWorker" in navigator){

navigator.serviceWorker
.register("./sw.js");

}

</script>

</body>
</html>
