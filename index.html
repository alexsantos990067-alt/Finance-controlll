<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Control AI Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#050816;
color:white;
min-height:100vh;
padding-bottom:120px;
}

.background{
position:fixed;
inset:0;
z-index:-1;
background:
radial-gradient(circle at top left,#12305d,transparent 40%),
radial-gradient(circle at bottom right,#081220,transparent 40%);
}

.page{display:none;}
.active{display:block;}

header{
display:flex;
justify-content:space-between;
padding:20px;
}

.logo{font-size:26px;font-weight:700;}
.logo span{color:#67a4ff;}

.main-card,.card,.section,nav{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
}

.main-card{width:92%;margin:auto;padding:25px;margin-top:15px;}

.balance{font-size:40px;font-weight:700;}

.cards{
width:92%;
margin:20px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
}

.card{padding:18px;}

.value{font-size:26px;font-weight:700;}

.section{width:92%;margin:15px auto;padding:20px;}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
}

.save-btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#2459a6;
color:white;
cursor:pointer;
}

/* NAV */
nav{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
justify-content:space-around;
padding:12px;
}

nav a{
color:white;
font-size:13px;
opacity:0.7;
cursor:pointer;
}

nav a.active-tab{
color:#79a7ff;
opacity:1;
}

/* progress */
.progress{
height:16px;
background:linear-gradient(90deg,#2459a6,#67a4ff);
width:0%;
transition:.5s;
border-radius:20px;
}
</style>
</head>

<body>

<div class="background"></div>

<header>
<div class="logo">Finance <span>AI Pro</span></div>
</header>

<!-- HOME -->
<div id="home" class="page active">

<section class="main-card">
<h2>Visão Inteligente</h2>
<div class="balance" id="saldo">0</div>
<button class="save-btn" onclick="analise()">Análise Financeira</button>
<div id="analiseBox"></div>
</section>

</div>

<!-- CARTEIRA -->
<div id="carteira" class="page">

<section class="section">
<h2>Movimentação</h2>

<input id="valor">
<select id="tipo">
<option value="entrada">Entrada</option>
<option value="saida">Saída</option>
</select>

<button class="save-btn" onclick="movimento()">Executar</button>
</section>

</div>

<!-- INVEST -->
<div id="investimentos" class="page">

<section class="section">
<h2>Meta Inteligente</h2>

<input id="meta">
<input id="meses">

<button class="save-btn" onclick="calcularMeta()">Calcular</button>

<div class="progress" id="bar"></div>
<div id="investBox"></div>
</section>

</div>

<!-- RELATORIO -->
<div id="relatorios" class="page">

<section class="section">
<h2>Relatório Automático</h2>
<div id="relatorio"></div>
</section>

</div>

<!-- PERFIL -->
<div id="perfil" class="page">

<section class="section">
<h2>Controle do Sistema</h2>

<button class="save-btn" onclick="limpar()">Reset Total</button>
</section>

</div>

<!-- MENU -->
<nav>
<a onclick="openTab('home')">Home</a>
<a onclick="openTab('carteira')">Carteira</a>
<a onclick="openTab('investimentos')">Invest</a>
<a onclick="openTab('relatorios')">Relatório</a>
<a onclick="openTab('perfil')">Perfil</a>
</nav>

<script>

let saldo=0,entradas=0,gastos=0,investimentos=0;
let meta=0;

function openTab(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function movimento(){

let v=parseFloat(document.getElementById("valor").value);
let t=document.getElementById("tipo").value;

if(isNaN(v)) return;

if(t=="entrada"){saldo+=v;entradas+=v;}
else{saldo-=v;gastos+=v;}

update();
}

function update(){

document.getElementById("saldo").innerText="R$ "+saldo;

analise();
}

function analise(){

let sugestao=saldo*0.2;

document.getElementById("analiseBox").innerHTML=
`
💡 Você pode investir: R$ ${sugestao.toFixed(2)}<br>
⚠ Gastos: ${gastos}
`;

document.getElementById("relatorio").innerHTML=
`
Entradas: ${entradas}<br>
Gastos: ${gastos}<br>
Saldo: ${saldo}
`;
}

function calcularMeta(){

meta=parseFloat(document.getElementById("meta").value);
let meses=parseFloat(document.getElementById("meses").value);

let mensal=meta/meses;

document.getElementById("investBox").innerHTML=
`
Meta: ${meta}<br>
Mensal: ${mensal.toFixed(2)}
`;

let perc=(saldo/meta)*100;

document.getElementById("bar").style.width=Math.min(perc,100)+"%";

if(perc>80) alert("⚠ Quase na meta!");
if(perc>=100) alert("🎉 Meta atingida!");
}

function limpar(){
saldo=0;entradas=0;gastos=0;investimentos=0;
update();
}

update();

</script>

</body>
</html>
