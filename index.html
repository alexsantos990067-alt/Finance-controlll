<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Control</title>

<style>

body{
background:#0B0B10;
font-family:Arial;
color:white;
padding:20px;
}

.card{
background:#17171F;
padding:20px;
border-radius:20px;
margin-top:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#222230;
color:white;
margin-top:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#8A05BE;
color:white;
font-size:18px;
margin-top:15px;
}

h1 span{
color:#BB86FC;
}

.gasto{
background:#20202B;
padding:15px;
border-radius:15px;
margin-top:10px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<h1>
Finance <span>Control</span>
</h1>

<div class="card">

<h3>Salário</h3>

<input
id="salario"
type="number"
value="1600"
>

<h3>
Saldo disponível
</h3>

<h1 id="saldo">
R$ 0
</h1>

</div>

<div class="card">

<h3>
Adicionar gasto
</h3>

<input
id="nome"
placeholder="Nome"
>

<input
id="valor"
type="number"
placeholder="Valor"
>

<button onclick="addGasto()">
Adicionar
</button>

</div>

<div id="lista"></div>

<script>

let gastos = [];

function atualizar(){

let salario =
Number(
document.getElementById('salario').value
);

let total = 0;

gastos.forEach(g=>{

total += g.valor;

});

let saldo =
salario - total;

document.getElementById('saldo')
.innerHTML =
'R$ ' + saldo.toFixed(2);

let lista =
document.getElementById('lista');

lista.innerHTML = '';

gastos.forEach((g,index)=>{

lista.innerHTML += `

<div class="gasto">

<div>

<b>${g.nome}</b>

<br>

R$ ${g.valor.toFixed(2)}

</div>

<button onclick="remover(${index})">
X
</button>

</div>

`;

});

}

function addGasto(){

let nome =
document.getElementById('nome').value;

let valor =
Number(
document.getElementById('valor').value
);

if(nome=='' || valor<=0){

return;

}

gastos.push({
nome,
valor
});

document.getElementById('nome').value='';

document.getElementById('valor').value='';

atualizar();

}

function remover(i){

gastos.splice(i,1);

atualizar();

}

document.getElementById('salario')
.addEventListener(
'input',
atualizar
);

atualizar();

</script>

</body>
</html>
