<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Finance Control</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">

  <div class="max-w-md mx-auto p-5 pb-28 space-y-5">

    <div>
      <h1 class="text-3xl font-bold">Finance Control</h1>
      <p class="text-zinc-400">
        Controle hoje. Liberdade amanhã.
      </p>
    </div>

    <!-- Inputs -->

    <div class="bg-zinc-900 rounded-3xl p-5 border border-zinc-800">

      <h2 class="text-xl font-bold mb-4">
        Dados Financeiros
      </h2>

      <div class="space-y-4">

        <div>
          <label class="text-sm text-zinc-400">
            Salário
          </label>

          <input
            id="salario"
            type="number"
            class="w-full mt-1 bg-zinc-800 rounded-2xl p-3 outline-none"
          >
        </div>

        <div>
          <label class="text-sm text-zinc-400">
            Dívidas
          </label>

          <input
            id="divida"
            type="number"
            class="w-full mt-1 bg-zinc-800 rounded-2xl p-3 outline-none"
          >
        </div>

      </div>

    </div>

    <!-- Cards -->

    <div class="grid grid-cols-2 gap-4">

      <div class="bg-zinc-900 rounded-3xl p-4">
        <p class="text-zinc-400 text-sm">Investimentos</p>

        <h2 class="text-2xl font-bold mt-2">
          R$ 0,00
        </h2>

        <p class="text-green-400 text-sm mt-1">
          +0,00%
        </p>
      </div>

      <div class="bg-zinc-900 rounded-3xl p-4">
        <p class="text-zinc-400 text-sm">Reserva</p>

        <h2 class="text-2xl font-bold mt-2">
          R$ 0,00
        </h2>

        <p class="text-blue-400 text-sm mt-1">
          Segurança
        </p>
      </div>

    </div>

    <!-- Resumo -->

    <div class="bg-zinc-900 rounded-3xl p-5">

      <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold">
          Resumo Inteligente
        </h2>

        <span class="text-green-400">
          Estável
        </span>
      </div>

      <div class="mt-4 space-y-2">

        <p>
          💰 Salário:
          <span id="salarioTexto"></span>
        </p>

        <p>
          📄 Consórcio:
          R$ 481,96
        </p>

        <p>
          ⚠️ Dívidas:
          <span id="dividaTexto"></span>
        </p>

        <hr class="border-zinc-700 my-3">

        <p class="text-2xl font-bold">
          Livre:
          <span id="livreTexto"></span>
        </p>

      </div>

    </div>

    <!-- Metas -->

    <div class="bg-zinc-900 rounded-3xl p-5">

      <div class="flex justify-between mb-5">
        <h2 class="text-xl font-bold">
          Metas
        </h2>

        <span class="text-zinc-400">
          2026
        </span>
      </div>

      <div class="space-y-5">

        <div>

          <div class="flex justify-between mb-2">
            <span>🎯 Lance Consórcio</span>
            <span>70%</span>
          </div>

          <div class="w-full bg-zinc-800 rounded-full h-3">

            <div
              class="bg-green-400 h-3 rounded-full"
              style="width:70%"
            ></div>

          </div>

        </div>

        <div>

          <div class="flex justify-between mb-2">
            <span>💰 Reserva</span>
            <span>35%</span>
          </div>

          <div class="w-full bg-zinc-800 rounded-full h-3">

            <div
              class="bg-blue-400 h-3 rounded-full"
              style="width:35%"
            ></div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- Menu -->

  <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800">

    <div class="max-w-md mx-auto grid grid-cols-4 gap-3 p-4">

      <button class="bg-zinc-900 rounded-2xl h-14 text-2xl">
        🏠
      </button>

      <button class="bg-zinc-900 rounded-2xl h-14 text-2xl">
        📈
      </button>

      <button class="bg-zinc-900 rounded-2xl h-14 text-2xl">
        💳
      </button>

      <button class="bg-zinc-900 rounded-2xl h-14 text-2xl">
        ⚙️
      </button>

    </div>

  </div>

  <script>

    const salario = document.getElementById('salario');
    const divida = document.getElementById('divida');

    const salarioTexto =
      document.getElementById('salarioTexto');

    const dividaTexto =
      document.getElementById('dividaTexto');

    const livreTexto =
      document.getElementById('livreTexto');

    salario.value =
      localStorage.getItem('salario') || 1600;

    divida.value =
      localStorage.getItem('divida') || 0;

    function atualizar() {

      const salarioValor =
        Number(salario.value);

      const dividaValor =
        Number(divida.value);

      const livre =
        salarioValor - 481.96 - dividaValor;

      localStorage.setItem(
        'salario',
        salarioValor
      );

      localStorage.setItem(
        'divida',
        dividaValor
      );

      salarioTexto.innerText =
        'R$ ' + salarioValor.toFixed(2);

      dividaTexto.innerText =
        'R$ ' + dividaValor.toFixed(2);

      livreTexto.innerText =
        'R$ ' + livre.toFixed(2);

    }

    salario.addEventListener(
      'input',
      atualizar
    );

    divida.addEventListener(
      'input',
      atualizar
    );

    atualizar();

  </script>

</body>
</html>
