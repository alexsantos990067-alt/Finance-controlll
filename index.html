<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Control</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#060b16;
      color:white;
      min-height:100vh;
      overflow-x:hidden;
    }

    .background{
      position:fixed;
      width:100%;
      height:100%;
      top:0;
      left:0;
      background:
      radial-gradient(circle at top left,#16335f 0%,transparent 30%),
      radial-gradient(circle at bottom right,#0c1f3d 0%,transparent 30%);
      z-index:-1;
    }

    header{
      padding:25px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .profile{
      width:45px;
      height:45px;
      border-radius:50%;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
    }

    .main-card{
      width:90%;
      margin:auto;
      padding:30px;
      border-radius:30px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.1);
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    .main-card h2{
      color:#8ca8d8;
      font-size:18px;
      margin-bottom:10px;
    }

    .balance{
      font-size:42px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .actions{
      display:flex;
      gap:15px;
      margin-top:20px;
    }

    .btn{
      flex:1;
      padding:14px;
      border:none;
      border-radius:15px;
      background:#12305d;
      color:white;
      font-size:15px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-3px);
      background:#1c4d94;
    }

    .cards{
      width:90%;
      margin:30px auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:20px;
    }

    .card{
      padding:25px;
      border-radius:25px;
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.08);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card h3{
      color:#8ca8d8;
      margin-bottom:10px;
      font-size:16px;
    }

    .value{
      font-size:28px;
      font-weight:bold;
    }

    .investment-box{
      width:90%;
      margin:20px auto;
      padding:30px;
      border-radius:30px;
      background:linear-gradient(
      135deg,
      rgba(17,35,70,0.9),
      rgba(8,18,36,0.9)
      );
      border:1px solid rgba(255,255,255,0.1);
    }

    .investment-box h2{
      margin-bottom:15px;
      color:#8ca8d8;
    }

    .investment-box input{
      width:100%;
      padding:15px;
      border:none;
      outline:none;
      border-radius:15px;
      background:rgba(255,255,255,0.08);
      color:white;
      margin-top:10px;
    }

    .investment-box button{
      width:100%;
      margin-top:20px;
      padding:15px;
      border:none;
      border-radius:15px;
      background:#2459a6;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    .result{
      margin-top:20px;
      font-size:18px;
      color:#9fc2ff;
    }

    nav{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      width:90%;
      padding:18px;
      border-radius:25px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
      display:flex;
      justify-content:space-around;
      border:1px solid rgba(255,255,255,0.1);
    }

    nav a{
      color:white;
      text-decoration:none;
      font-size:14px;
      transition:0.3s;
    }

    nav a:hover{
      color:#79a7ff;
    }
  </style>
</head>

<body>

<div class="background"></div>

<header>
  <div class="logo">Finance Control</div>
  <div class="profile"></div>
</header>

<section class="main-card">
  <h2>Saldo Total</h2>
  <div class="balance">R$ 12.450,00</div>

  <div class="actions">
    <button class="btn">Receber</button>
    <button class="btn">Transferir</button>
  </div>
</section>

<section class="cards">

  <div class="card">
    <h3>Entradas</h3>
    <div class="value">R$ 8.200</div>
  </div>

  <div class="card">
    <h3>Gastos</h3>
    <div class="value">R$ 3.120</div>
  </div>

  <div class="card">
    <h3>Investimentos</h3>
    <div class="value">R$ 1.980</div>
  </div>

  <div class="card">
    <h3>Economia</h3>
    <div class="value">R$ 2.540</div>
  </div>

</section>

<section class="investment-box">

  <h2>Planejamento de Investimentos</h2>

  <input type="number" id="meta" placeholder="Meta desejada">

  <input type="number" id="meses" placeholder="Quantidade de meses">

  <button onclick="calcular()">
    Calcular investimento mensal
  </button>

  <div class="result" id="resultado"></div>

</section>

<nav>
  <a href="#">Home</a>
  <a href="#">Carteira</a>
  <a href="#">Investimentos</a>
  <a href="#">Relatórios</a>
  <a href="#">Perfil</a>
</nav>

<script>

function calcular(){

  let meta =
  document.getElementById('meta').value;

  let meses =
  document.getElementById('meses').value;

  let resultado =
  document.getElementById('resultado');

  if(meta === "" || meses === ""){
    resultado.innerHTML =
    "Preencha todos os campos.";
    return;
  }

  let valor = meta / meses;

  resultado.innerHTML =
  "Você precisa investir aproximadamente <br><br><strong>R$ "
  + valor.toFixed(2)
  + "</strong> por mês.";
}

</script>

</body>
</html>
