<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Finance Control</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

  <div class="max-w-md mx-auto p-5 space-y-5">

    <div>
      <h1 class="text-3xl font-bold">Finance Control</h1>
      <p class="text-zinc-400">
        Controle hoje. Liberdade amanhã.
      </p>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-5 border border-zinc-800">
      <h2 class="text-xl font-semibold mb-4">
        Dados Financeiros
      </h2>

      <div class="space-y-4">

        <div>
          <label class="text-sm text-zinc-400">
            Salário
          </label>

          <input
            id="salario"
            type="number"
            class="w-full mt-1 bg-zinc-800 border border-zinc-700 rounded-2xl p-3 outline-none"
          />
        </div>

        <div>
          <label class="text-sm text-zinc-400">
            Dívidas
          </label>

          <input
            id="divida"
            type="number"
            class="w-full mt-1 bg-zinc-800 border border-zinc-700 rounded-2xl p-3 outline-none"
          />
        </div>

      </div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-5 border border-zinc-800">
      <h2 class="text-xl font-semibold">
        Resumo Inteligente
      </h2>

      <div class="mt-4 space-y-2">
        <p>💰 Salário: <span id="salarioTexto"></span></p>
        <p>📄 Consórcio: R$ 481,96</p>
        <p>⚠️ Dívidas: <span id="dividaTexto"></span></p>

        <hr class="border-zinc-700 my-3">

        <p class="text-2xl font-bold">
          Livre:
          <span id="livre"></span>
        </p>
      </div>
    </div>

    <div class="bg-green-500/10 border border-green-500/20 rounded-3xl p-5">
      <h2 class="text-xl font-bold">
        Objetivo 🎯
      </h2>

      <p class="text-zinc-300 mt-3">
        Continue firme no consórcio e evite novas dívidas.
      </p>
    </div>

  </div>

  <script>

    const salarioInput = document.getElementById('salario');
    const dividaInput = document.getElementById('divida');

    const salarioTexto = document.getElementById('salarioTexto');
    const dividaTexto = document.getElementById('dividaTexto');
    const livreTexto = document.getElementById('livre');

    salarioInput.value = localStorage.getItem('salario') || 1600;
    dividaInput.value = localStorage.getItem('divida') || 0;

    function atualizar() {

      const salario = Number(salarioInput.value);
      const divida = Number(dividaInput.value);

      const livre = salario - 481.96 - divida;

      localStorage.setItem('salario', salario);
      localStorage.setItem('divida', divida);

      salarioTexto.innerText =
        'R$ ' + salario.toFixed(2);

      dividaTexto.innerText =
        'R$ ' + divida.toFixed(2);

      livreTexto.innerText =
        'R$ ' + livre.toFixed(2);
    }

    salarioInput.addEventListener('input', atualizar);
    dividaInput.addEventListener('input', atualizar);

    atualizar();

  </script>

</body>
</html>
